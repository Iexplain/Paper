<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Daily Paper Dashboard</title>
<style>
body { font-family: Arial, sans-serif; margin: 40px; }
h2 { color: #333; }
.paper { margin-bottom: 15px; }
.authors { font-size: 0.9em; color: #555; }
</style>
</head>
<body>
<h1>Daily Paper Dashboard</h1>

<h2>arXiv Papers</h2>
{% for paper in arxiv %}
<div class="paper">
  <a href="{{ paper.link }}" target="_blank">{{ paper.title }}</a><br>
  <div class="authors">{{ paper.authors | join(", ") }}</div>
  <div class="date">{{ paper.date }}</div>
</div>
{% endfor %}

<h2>PubMed Papers</h2>
{% for paper in pubmed %}
<div class="paper">
  <a href="{{ paper.link }}" target="_blank">{{ paper.title }}</a><br>
  <div class="authors">{{ paper.authors | join(", ") }}</div>
  <div class="date">{{ paper.date }}</div>
</div>
{% endfor %}
</body>
</html>
