<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Paper Dashboard</title>
    <style>
        /* 定义全局 CSS 变量，方便统一管理颜色 */
        :root {
            --primary-color: #2563eb;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --accent-tag: #dbeafe;
            --accent-tag-text: #1e40af;
            --border-color: #e2e8f0;
            --sidebar-bg: #ffffff;
        }

        /* 暗黑模式变量覆盖 */
        [data-theme="dark"] {
            --primary-color: #60a5fa;
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-tag: #1e3a8a;
            --accent-tag-text: #bfdbfe;
            --border-color: #334155;
            --sidebar-bg: #1e293b;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            background: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            display: flex; /* 采用 Flex 布局 */
            transition: background-color 0.3s, color 0.3s;
        }

        /* === 侧边栏样式 === */
        .sidebar {
            width: 260px;
            height: 100vh; /* 撑满屏幕高度 */
            position: fixed; /* 固定在左侧，不随页面滚动 */
            left: 0;
            top: 0;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            padding: 30px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 30px;
            z-index: 100;
        }

        .sidebar-brand { font-size: 1.4rem; font-weight: 800; color: var(--primary-color); }
        .sidebar-section h4 { font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 12px; letter-spacing: 0.05em; }
        
        .filter-btn {
            display: block; width: 100%; text-align: left; padding: 10px 12px; margin-bottom: 8px;
            background: transparent; border: 1px solid var(--border-color); border-radius: 8px;
            color: var(--text-main); cursor: pointer; font-size: 0.9rem; transition: all 0.2s;
        }
        .filter-btn:hover { background: var(--bg-color); border-color: var(--primary-color); }
        .filter-btn.active { background: var(--primary-color); color: #fff; border-color: var(--primary-color); }

        .theme-toggle {
            margin-top: auto; /* 推到侧边栏最底部 */
            padding: 12px; background: var(--bg-color); border: 1px solid var(--border-color);
            border-radius: 8px; cursor: pointer; color: var(--text-main); font-weight: bold; width: 100%;
        }

        /* === 主内容区样式 === */
        .main-content {
            margin-left: 260px; /* 留出侧边栏的宽度 */
            padding: 40px;
            flex: 1;
            min-height: 100vh;
        }

        header { margin-bottom: 40px; }
        h1 { font-size: 2.2rem; margin-bottom: 8px; font-weight: 800; }
        .stats { color: var(--text-muted); font-size: 1.1rem; }

        .paper-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 20px;
        }

        .paper-card {
            background: var(--card-bg); padding: 24px; border-radius: 16px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            display: flex; flex-direction: column; transition: transform 0.2s;
        }
        .paper-card:hover { transform: translateY(-4px); border-color: var(--primary-color); }
        .paper-card h3 { font-size: 1.2rem; margin: 0 0 12px 0; line-height: 1.4; }
        .paper-card h3 a { color: var(--text-main); text-decoration: none; }
        .paper-card h3 a:hover { color: var(--primary-color); }
        .authors { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 12px; font-style: italic; }
        
        .abstract-summary {
            background: var(--bg-color); padding: 12px; border-radius: 8px;
            font-size: 0.9rem; color: var(--text-muted); margin-bottom: 16px;
            border-left: 4px solid var(--primary-color);
        }

        .tags-container { margin-top: auto; display: flex; flex-wrap: wrap; gap: 8px; padding-top: 16px; border-top: 1px dashed var(--border-color); }
        .tag { font-size: 0.75rem; font-weight: 600; padding: 4px 10px; border-radius: 6px; background: var(--accent-tag); color: var(--accent-tag-text); }
        
        /* 隐藏元素的类 */
        .hidden { display: none !important; }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="sidebar-brand">📚 Paper Dash</div>
    
    <div class="sidebar-section">
        <h4>快速过滤</h4>
        <button class="filter-btn active" onclick="filterPapers('all', this)">🌐 全部文献</button>
        <button class="filter-btn" onclick="filterPapers('LLM', this)">🧠 LLM</button>
        <button class="filter-btn" onclick="filterPapers('Foundation Model', this)">🧱 Foundation Model</button>
        <button class="filter-btn" onclick="filterPapers('Protein Language Model', this)">🧬 Protein Language Model</button>
        <button class="filter-btn" onclick="filterPapers('Fine-tuning', this)">⚙️ Fine-tuning</button>
        <button class="filter-btn" onclick="filterPapers('Deep Learning', this)">📉 Deep Learning</button>
    </div>

    <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">🌙 切换暗黑模式</button>
</aside>

<main class="main-content">
    <header>
        <h1>今日前沿文献</h1>
        <div class="stats">共收录 <strong id="total-count">{{ all_papers|length }}</strong> 篇</div>
    </header>

    <div class="paper-grid" id="paper-container">
        {% for paper in all_papers %}
        <div class="paper-card" data-keywords="{{ paper.keywords | join(',') }}">
            <h3><a href="{{ paper.link }}" target="_blank">{{ paper.title }}</a></h3>
            <div class="authors">{{ paper.authors | join(", ") }}</div>
            
            <div class="abstract-summary">
                <strong>Abstract:</strong> {{ paper.summary }}
            </div>

            <div class="tags-container">
                <span class="tag" style="background:var(--border-color); color:var(--text-muted);">📅 {{ paper.date }}</span>
                {% if paper.keywords %}
                    {% for tag in paper.keywords %}
                        <span class="tag">{{ tag }}</span>
                    {% endfor %}
                {% endif %}
            </div>
        </div>
        {% endfor %}
    </div>
</main>

<script>
    // 1. 暗黑模式切换逻辑
    function toggleTheme() {
        const html = document.documentElement;
        const btn = document.getElementById('theme-btn');
        if (html.getAttribute('data-theme') === 'light') {
            html.setAttribute('data-theme', 'dark');
            btn.innerText = '☀️ 切换明亮模式';
            localStorage.setItem('theme', 'dark'); // 记住用户选择
        } else {
            html.setAttribute('data-theme', 'light');
            btn.innerText = '🌙 切换暗黑模式';
            localStorage.setItem('theme', 'light');
        }
    }

    // 页面加载时恢复历史主题
    if(localStorage.getItem('theme') === 'dark') {
        toggleTheme();
    }

    // 2. 前端纯 JS 标签过滤逻辑
    function filterPapers(keyword, btnElement) {
        // 更新按钮激活状态
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        btnElement.classList.add('active');

        // 获取所有卡片
        const cards = document.querySelectorAll('.paper-card');
        let visibleCount = 0;

        cards.forEach(card => {
            const keywordsStr = card.getAttribute('data-keywords');
            if (keyword === 'all' || keywordsStr.includes(keyword)) {
                card.classList.remove('hidden');
                visibleCount++;
            } else {
                card.classList.add('hidden');
            }
        });

        // 动态更新显示的文献数量
        document.getElementById('total-count').innerText = visibleCount;
    }
</script>

</body>
</html>
