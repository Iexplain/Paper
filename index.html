<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Paper Dashboard</title>
    <style>
        :root {
            --primary-color: #2563eb; --bg-color: #f8fafc; --card-bg: #ffffff;
            --text-main: #1e293b; --text-muted: #64748b; --accent-tag: #dbeafe;
            --accent-tag-text: #1e40af; --border-color: #e2e8f0; --sidebar-bg: #ffffff;
        }

        [data-theme="dark"] {
            --primary-color: #60a5fa; --bg-color: #0f172a; --card-bg: #1e293b;
            --text-main: #f8fafc; --text-muted: #94a3b8; --accent-tag: #1e3a8a;
            --accent-tag-text: #bfdbfe; --border-color: #334155; --sidebar-bg: #1e293b;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif; margin: 0; padding: 0;
            background: var(--bg-color); color: var(--text-main); line-height: 1.6;
            display: flex; transition: background-color 0.3s, color 0.3s;
        }
        
        .sidebar-trigger {
            position: fixed;
            top: 0;
            left: 0;
            width: 20px;
            height: 100vh;
            z-index: 1001;
            background: transparent; 
        }
        /* === 侧边栏样式 === */
        .sidebar {
            width: 260px; height: 100vh; position: fixed; top: 0; left: -260px;
            background: var(--sidebar-bg); border-right: 1px solid var(--border-color);
            padding: 30px 20px; box-sizing: border-box; display: flex; flex-direction: column;
            gap: 12px; z-index: 1000;
            overflow-y: auto;
            scrollbar-width: none; -ms-overflow-style: none;
            box-shadow: 4px 0 24px rgba(0, 0, 0, 0.1);
            transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .sidebar::-webkit-scrollbar { display: none; }
        .sidebar::after {
            content: '';
            position: absolute;
            top: 0;
            right: -40px; 
            width: 40px;
            height: 100%;
            background: rgba(0, 0, 0, 0.01);
        }
        .sidebar-trigger:hover + .sidebar,
        .sidebar:hover {
            left: 0;
        }
        .sidebar-section { margin-bottom: 10px; }
        .sidebar-section h4 { font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 12px; letter-spacing: 0.05em; }
        
        .filter-btn {
            display: block; width: 100%; text-align: left; padding: 10px 12px; margin-bottom: 8px;
            background: transparent; border: 1px solid var(--border-color); border-radius: 8px;
            color: var(--text-main); cursor: pointer; font-size: 0.9rem; transition: all 0.2s;
        }
        .filter-btn:hover { background: var(--bg-color); border-color: var(--primary-color); }
        .filter-btn.active { background: var(--primary-color); color: #fff; border-color: var(--primary-color); }

        .source-checkbox {
            display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
            font-size: 0.9rem; color: var(--text-main); cursor: pointer;
        }
        .source-checkbox input { cursor: pointer; width: 16px; height: 16px; accent-color: var(--primary-color); }

        .theme-toggle {
            margin-top: auto; padding: 12px; background: var(--bg-color); border: 1px solid var(--border-color);
            border-radius: 8px; cursor: pointer; color: var(--text-main); font-weight: bold; width: 100%;
        }

        /* === 状态标识与悬浮窗样式 === */
        .status-badge {
            display: inline-flex; align-items: center; gap: 4px;
            background: rgba(34, 197, 94, 0.15); color: #16a34a; padding: 4px 10px; 
            border-radius: 999px; font-size: 0.8rem; font-weight: bold; cursor: help; 
            margin-left: 12px; border: 1px solid rgba(34, 197, 94, 0.3); transition: all 0.2s ease;
        }
        [data-theme="dark"] .status-badge { color: #4ade80; }
        .status-badge:hover { background: rgba(34, 197, 94, 0.25); }

        .tooltip-container { position: relative; display: inline-block; }
        .tooltip-text {
            position: absolute; bottom: 130%; left: 50%; transform: translateX(-50%);
            background: #1e293b; color: #f8fafc; padding: 12px 16px; border-radius: 10px;
            font-size: 0.85rem; width: max-content; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            opacity: 0; visibility: hidden; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000; text-align: left; line-height: 1.8; border: 1px solid #334155;
        }
        .tooltip-text::after {
            content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
            border-width: 6px; border-style: solid; border-color: #334155 transparent transparent transparent;
        }
        .tooltip-container:hover .tooltip-text { opacity: 1; visibility: visible; bottom: 145%; }
        .tooltip-header { font-weight: 800; margin-bottom: 6px; padding-bottom: 6px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); color: #e2e8f0; }

        /* === 主内容区样式 === */
        .main-content { margin-left: 0; padding: 30px 40px 40px; padding-left: 60px; flex: 1; min-height: 100vh; }
        header { margin-bottom: 40px; }
        h1 { font-size: 2.2rem; margin: 0 0 8px 0; font-weight: 800; line-height: 1.1; }
        .stats { color: var(--text-muted); font-size: 1.1rem; }

        .paper-grid { display: grid; grid-template-columns: 1fr; gap: 24px; }
        .paper-card {
            background: var(--card-bg); padding: 24px; border-radius: 16px; border: 1px solid var(--border-color);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); display: flex; flex-direction: column; transition: transform 0.2s;
        }
        .paper-card:hover { transform: translateY(-4px); border-color: var(--primary-color); }
        .paper-card h3 { font-size: 1.2rem; margin: 0 0 12px 0; line-height: 1.4; }
        .paper-card h3 a { color: var(--text-main); text-decoration: none; }
        .paper-card h3 a:hover { color: var(--primary-color); }
        .authors { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 12px; font-style: italic; }
        
        .abstract-summary {
          
            background: var(--bg-color); padding: 12px; border-radius: 8px; font-size: 0.9rem;
            color: var(--text-muted); margin-bottom: 16px; border-left: 4px solid var(--primary-color);
        }

        .tags-container { margin-top: auto; display: flex; flex-wrap: wrap; gap: 8px; padding-top: 16px; border-top: 1px dashed var(--border-color); }
        .tag { font-size: 0.75rem; font-weight: 600; padding: 4px 10px; border-radius: 6px; background: var(--accent-tag); color: var(--accent-tag-text); }
        
        .hidden { display: none !important; }

        /* === 顶部下拉仪表盘与触发区样式 === */
        .topbar-trigger {
            position: fixed; top: 0; left: 0; width: 100%; height: 20px;
            z-index: 1001; background: transparent;
        }
        .topbar {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: var(--card-bg); border: 1px solid var(--border-color);
            border-top: none; border-radius: 0 0 16px 16px; /* 底部圆角 */
            padding: 16px 32px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            display: flex; align-items: center; gap: 24px; z-index: 1000;
            transition: top 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            white-space: nowrap;
        }
        .topbar-trigger:hover + .topbar,
        .topbar:hover {
            top: 0;
        }
    </style>
</head>
<body>
<div class="topbar-trigger"></div>
<div class="topbar">
    <div style="font-size: 0.9rem; display: flex; gap: 16px; align-items: center;">
        <span style="color: var(--text-muted);">最新爬虫报告:</span>
        <span>接口读取 <strong>0</strong></span>
        <span style="color: #16a34a;">本次上新 <strong>0</strong></span>
        <span style="color: var(--primary-color);">库内总计 <strong>0</strong></span>
        <span style="color: #ef4444;">太老过滤 <strong>0</strong></span>
    </div>
</div>
<div class="sidebar-trigger"></div>
<aside class="sidebar">
    <div class="sidebar-section">
        <h4>数据来源</h4>
        <label class="source-checkbox">
            <input type="checkbox" value="Semantic Scholar" checked onchange="applyFilters()"> 🎓 Semantic Scholar
        </label>
        <label class="source-checkbox">
            <input type="checkbox" value="arXiv" checked onchange="applyFilters()"> 📜 arXiv
        </label>
        <label class="source-checkbox">
            <input type="checkbox" value="PubMed" checked onchange="applyFilters()"> 🏥 PubMed
        </label>
    </div>

    <div class="sidebar-section">
        <h4>时间范围</h4>
        <select id="time-filter" onchange="applyFilters()" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-color); color: var(--text-main); font-size: 0.9rem; cursor: pointer; outline: none;">
            <option value="all">不限时间</option>
            <option value="today">今日更新</option>
            <option value="3days" selected>近三天</option>
            <option value="1week">近一周</option>
            <option value="2weeks">近两周</option>
        </select>
    </div>

    <div class="sidebar-section">
        <h4>快速过滤</h4>
        <button class="filter-btn active" onclick="setKeywordFilter('all', this)">全部文献</button>        
        <button class="filter-btn" onclick="setKeywordFilter('Biological Large Model', this)">Biological Large Model</button>
        <button class="filter-btn" onclick="setKeywordFilter('Protein Language Model', this)">Protein Language Model</button>
        <button class="filter-btn" onclick="setKeywordFilter('Fine-tuning', this)">Fine-tuning</button>
        <button class="filter-btn" onclick="setKeywordFilter('AIDD', this)">AIDD</button>
    </div>

    <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">🌙 切换暗黑模式</button>
</aside>

<main class="main-content">
    <header style="display: flex; align-items: center; gap: 16px; flex-wrap: wrap; margin-bottom: 30px;">
        <h1 style="margin: 0;">今日前沿文献</h1>
        
        <div style="background: var(--accent-tag); color: var(--primary-color); padding: 6px 16px; border-radius: 999px; font-size: 0.95rem; font-weight: 600; border: 1px solid rgba(37, 99, 235, 0.2);">
            当前显示 <strong id="total-count" style="font-size: 1.15rem; margin: 0 4px;">0</strong> 篇
        </div>
    </header>

    <div class="paper-grid" id="paper-container">
        
    </div>
</main>

<script>
    // 1. 暗黑模式
    function toggleTheme() {
        const html = document.documentElement;
        const btn = document.getElementById('theme-btn');
        if (html.getAttribute('data-theme') === 'light') {
            html.setAttribute('data-theme', 'dark');
            btn.innerText = '☀️ 切换明亮模式';
            localStorage.setItem('theme', 'dark');
        } else {
            html.setAttribute('data-theme', 'light');
            btn.innerText = '🌙 切换暗黑模式';
            localStorage.setItem('theme', 'light');
        }
    }
    if(localStorage.getItem('theme') === 'dark') { toggleTheme(); }

    // 2. 核心状态与过滤逻辑
    let currentKeyword = 'all'; 

    function setKeywordFilter(keyword, btnElement) {
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        btnElement.classList.add('active');
        currentKeyword = keyword;
        applyFilters(); 
    }

    function applyFilters() {
        // 提取复选框与时间选项
        const checkedSources = Array.from(document.querySelectorAll('.source-checkbox input:checked')).map(cb => cb.value);
        const timeFilter = document.getElementById('time-filter').value;
        const cards = document.querySelectorAll('.paper-card');
        let visibleCount = 0;
        const now = Date.now();

        cards.forEach(card => {
            const keywordsStr = card.getAttribute('data-keywords') || "";
            const source = card.getAttribute('data-source') || "";
            const dateStr = card.getAttribute('data-date') || "";
            
            // 修复 Bug 2: 精确匹配标签（切割为数组）
            let matchKeyword = (currentKeyword === 'all');
            if (!matchKeyword) {
                const keywordArray = keywordsStr.split(',');
                matchKeyword = keywordArray.includes(currentKeyword);
            }

            // 数据源匹配
            const matchSource = checkedSources.includes(source);

            // 修复 Bug 3: 时间匹配（妥善处理缺少日期和只有年份的 PubMed 数据）
            let matchTime = true;
            if (timeFilter !== 'all') {
                if (!dateStr) {
                    matchTime = true; // 缺失日期默认放行
                } else if (dateStr.length <= 4) {
                    matchTime = true; // 仅有年份（如 "2026"），时间精度不足以过滤天数，直接放行
                } else {
                    const paperTime = new Date(dateStr).getTime();
                    if (!isNaN(paperTime)) {
                        const diffDays = (now - paperTime) / (1000 * 3600 * 24);
                        if (timeFilter === 'today') matchTime = diffDays <= 1.5;
                        else if (timeFilter === '3days') matchTime = diffDays <= 3.5;
                        else if (timeFilter === '1week') matchTime = diffDays <= 7.5;
                        else if (timeFilter === '2weeks') matchTime = diffDays <= 14.5;
                    }
                }
            }

            // 综合控制显隐
            if (matchKeyword && matchSource && matchTime) {
                card.classList.remove('hidden');
                visibleCount++;
            } else {
                card.classList.add('hidden');
            }
        });

        document.getElementById('total-count').innerText = visibleCount;
    }
    window.addEventListener('DOMContentLoaded', (event) => {
        applyFilters();
    });
</script>

</body>
</html>
