name: Daily Literature Collector & Viz Dashboard
on:
  schedule:
    - cron: '0 16 * * *'  # 每日UTC 16:00 (北京00:00)
  workflow_dispatch:  # 手动触发[6]

jobs:
  collect-viz-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4  # 拉取代码到GITHUB_WORKSPACE[9][10]

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt || true  # 忽略无效包
        pip install sqlite3  # 显式安装（虽内置但保险）
      working-directory: ${{ github.workspace }}


    - name: Collect papers  # 步骤1
      run: python scripts/fetch_papers.py --keywords "Agent,LLM,ML,Fine-tuning" --max_papers 30
      working-directory: ${{ github.workspace }}  # 确保scripts/可执行[1]

    - name: Analyze papers  # 步骤2
      run: python scripts/analyze_papers.py
      working-directory: ${{ github.workspace }}

    - name: Generate visualization web  # 步骤3
      run: python scripts/generate_web.py
      working-directory: ${{ github.workspace }}

    - name: Deploy to GitHub Pages  # 步骤4[5][10]
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./output  # 精确部署路径[5]
