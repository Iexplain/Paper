name: Daily Paper Update

on:
  schedule:
    - cron: '0 0 * * *'  # 每天 UTC 时间 0:00 运行
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:       
      contents: write
    
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch Semantic Scholar papers
        run: python scripts/fetch_s2.py

      - name: Generate HTML
        run: python scripts/generate_web.py

      - name: Commit and push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -f data/ index.html
          git commit -m "Daily paper update" || echo "No changes"
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }} HEAD:main
