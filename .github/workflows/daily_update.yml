name: Daily Paper Update

on:
  schedule:
    - cron: '0 8 * * *'  # 每天 UTC 8 点执行
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ 检出仓库
      - uses: actions/checkout@v3

      # 2️⃣ 设置 Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # 3️⃣ 安装依赖
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 4️⃣ 抓取 arXiv 文献
      - name: Fetch arXiv papers
        run: python scripts/fetch_arxiv.py

      # 5️⃣ 抓取 PubMed 文献
      - name: Fetch PubMed papers
        run: python scripts/fetch_pubmed.py

      # 6️⃣ 生成网页
      - name: Generate HTML
        run: python scripts/generate_web.py

      # 7️⃣ Commit & Push（使用 GITHUB_TOKEN）
      - name: Commit and push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -f data/*.json index.html
          git commit -m "Daily paper update" || echo "No changes"
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }} HEAD:main
